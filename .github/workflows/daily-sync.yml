name: Daily AI Data Sync

on:
  schedule:
    # Runs at 00:00 UTC (around 18:00 MDT) every day
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  sync-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }} # Needed to commit back to the repo

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Fetch and Compile Daily AI Data
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npm run update-data

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/*.ts
          if git diff --cached --quiet; then
            echo "No data changes compiled today. Skipping commit."
          else
            git commit -m "chore: auto-sync daily AI telemetry data [skip ci]"
            git push origin main
          fi
